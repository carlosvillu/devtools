<!-- @dsCard group="Colors" viewport="700x160" name="Accent — technical blue" subtitle="--accent · the single brand hue" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="padding:22px 24px;background:var(--surface)">
<div style="display:flex;gap:10px">
<div style="flex:1"><div style="height:64px;background:var(--blue-50);border-radius:var(--radius) var(--radius) 0 0"></div><div style="height:64px;background:var(--blue-100)"></div><div style="height:64px;background:var(--blue-200);border-radius:0 0 var(--radius) var(--radius)"></div></div>
<div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:8px">
<div style="display:flex;align-items:center;gap:10px"><span style="width:32px;height:32px;border-radius:var(--radius-sm);background:var(--blue-400)"></span><code style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted)">blue-400</code></div>
<div style="display:flex;align-items:center;gap:10px"><span style="width:32px;height:32px;border-radius:var(--radius-sm);background:var(--blue-500)"></span><code style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted)">blue-500 · ring</code></div>
<div style="display:flex;align-items:center;gap:10px"><span style="width:32px;height:32px;border-radius:var(--radius-sm);background:var(--accent)"></span><code style="font-family:var(--font-mono);font-size:12px;color:var(--text)">accent · blue-600</code></div>
<div style="display:flex;align-items:center;gap:10px"><span style="width:32px;height:32px;border-radius:var(--radius-sm);background:var(--blue-700)"></span><code style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted)">accent-hover · 700</code></div>
</div>
</div>
</body></html>
