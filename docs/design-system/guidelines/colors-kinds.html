<!-- @dsCard group="Colors" viewport="700x170" name="DataKind palette" subtitle="Each type gets one fixed hue" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="padding:22px 24px;background:var(--surface);font-family:var(--font-mono);font-size:12px">
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
<div style="display:flex;align-items:center;gap:8px"><span style="width:14px;height:14px;border-radius:3px;background:var(--accent)"></span>jwt</div>
<div style="display:flex;align-items:center;gap:8px"><span style="width:14px;height:14px;border-radius:3px;background:var(--violet-500)"></span>json</div>
<div style="display:flex;align-items:center;gap:8px"><span style="width:14px;height:14px;border-radius:3px;background:var(--cyan-500)"></span>base64</div>
<div style="display:flex;align-items:center;gap:8px"><span style="width:14px;height:14px;border-radius:3px;background:var(--amber-500)"></span>timestamp</div>
<div style="display:flex;align-items:center;gap:8px"><span style="width:14px;height:14px;border-radius:3px;background:var(--green-500)"></span>url</div>
<div style="display:flex;align-items:center;gap:8px"><span style="width:14px;height:14px;border-radius:3px;background:var(--cyan-500)"></span>uuid</div>
<div style="display:flex;align-items:center;gap:8px"><span style="width:14px;height:14px;border-radius:3px;background:var(--red-500)"></span>hash</div>
<div style="display:flex;align-items:center;gap:8px"><span style="width:14px;height:14px;border-radius:3px;background:var(--gray-400)"></span>text</div>
</div>
<p style="margin:16px 0 0;font-family:var(--font-sans);font-size:12px;color:var(--text-muted)">A fixed colour + icon per type means a <code style="font-family:var(--font-mono)">jwt</code> always reads as a jwt across the whole app.</p>
</body></html>
