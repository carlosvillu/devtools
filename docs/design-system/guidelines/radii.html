<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="Crisp — 4 to 16px" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="padding:22px 24px;background:var(--surface);font-family:var(--font-mono);font-size:11px">
<div style="display:flex;gap:18px;align-items:flex-start">
<div style="display:flex;flex-direction:column;align-items:center;gap:8px"><span style="width:60px;height:52px;background:var(--surface-2);border:1px solid var(--border-strong);border-radius:var(--radius-sm)"></span><span style="color:var(--text-subtle)">sm · 4</span></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:8px"><span style="width:60px;height:52px;background:var(--surface-2);border:1px solid var(--border-strong);border-radius:var(--radius)"></span><span style="color:var(--text-subtle)">base · 6</span></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:8px"><span style="width:60px;height:52px;background:var(--surface-2);border:1px solid var(--border-strong);border-radius:var(--radius-md)"></span><span style="color:var(--text-subtle)">md · 8</span></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:8px"><span style="width:60px;height:52px;background:var(--surface-2);border:1px solid var(--border-strong);border-radius:var(--radius-lg)"></span><span style="color:var(--text-subtle)">lg · 12</span></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:8px"><span style="width:60px;height:52px;background:var(--surface-2);border:1px solid var(--border-strong);border-radius:var(--radius-xl)"></span><span style="color:var(--text-subtle)">xl · 16</span></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:8px"><span style="width:52px;height:52px;background:var(--surface-2);border:1px solid var(--border-strong);border-radius:var(--radius-full)"></span><span style="color:var(--text-subtle)">full</span></div>
</div>
</body></html>
