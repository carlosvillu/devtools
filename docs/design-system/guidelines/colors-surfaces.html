<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces & text" subtitle="Light UI, dark data — the terminal motif" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="padding:22px 24px;background:var(--bg);font-family:var(--font-sans)">
<div style="display:flex;gap:12px;align-items:stretch">
<div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px"><div style="font-size:12px;color:var(--text)">text</div><div style="font-size:12px;color:var(--text-muted)">text-muted</div><div style="font-size:12px;color:var(--text-subtle)">text-subtle</div><div style="margin-top:8px;font-family:var(--font-mono);font-size:10px;color:var(--text-subtle)">surface</div></div>
<div style="flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px"><div style="font-family:var(--font-mono);font-size:10px;color:var(--text-subtle)">surface-2</div></div>
<div style="flex:1.4;background:var(--code-bg);border-radius:var(--radius-md);padding:12px;font-family:var(--font-mono)"><span style="color:var(--code-key)">"alg"</span><span style="color:var(--code-punc)">: </span><span style="color:var(--code-string)">"HS256"</span><div style="margin-top:8px;font-size:10px;color:var(--code-muted)">code-bg · always dark</div></div>
</div>
</body></html>
