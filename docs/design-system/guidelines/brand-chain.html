<!-- @dsCard group="Brand" viewport="700x170" name="The chain motif" subtitle="detect → transform → re-detect, shown whole" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="padding:22px 24px;background:var(--surface);font-family:var(--font-mono);font-size:12px">
<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;color:var(--text)">
<span style="padding:4px 8px;border-radius:4px;background:var(--code-bg);color:var(--code-fg)">Bearer eyJ…</span>
<span style="color:var(--text-subtle)">→</span>
<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:4px;background:var(--accent-subtle-bg);color:var(--accent-subtle-fg);border:1px solid color-mix(in oklab,var(--accent) 30%,transparent)">jwt</span>
<span style="color:var(--text-subtle)">→</span>
<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:4px;background:color-mix(in oklab,var(--violet-500) 14%,var(--surface));color:var(--violet-700);border:1px solid color-mix(in oklab,var(--violet-500) 32%,transparent)">json</span>
<span style="color:var(--text-subtle)">→</span>
<span style="padding:4px 8px;border-radius:4px;background:var(--code-bg);color:var(--code-string)">{ … }</span>
</div>
<p style="margin:16px 0 0;font-family:var(--font-sans);font-size:12px;color:var(--text-muted);max-width:520px">La cadena se construye sola y se muestra entera — no solo el resultado final. Cada paso es reversible, inspeccionable y copiable.</p>
</body></html>
