<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base grid" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="padding:22px 24px;background:var(--surface);font-family:var(--font-mono);font-size:11px">
<div style="display:flex;align-items:flex-end;gap:14px;color:var(--text-subtle)">
<div style="display:flex;flex-direction:column;align-items:center;gap:6px"><span style="width:var(--space-1);height:var(--space-1);background:var(--accent)"></span>1</div>
<div style="display:flex;flex-direction:column;align-items:center;gap:6px"><span style="width:var(--space-2);height:var(--space-2);background:var(--accent)"></span>2</div>
<div style="display:flex;flex-direction:column;align-items:center;gap:6px"><span style="width:var(--space-3);height:var(--space-3);background:var(--accent)"></span>3</div>
<div style="display:flex;flex-direction:column;align-items:center;gap:6px"><span style="width:var(--space-4);height:var(--space-4);background:var(--accent)"></span>4</div>
<div style="display:flex;flex-direction:column;align-items:center;gap:6px"><span style="width:var(--space-6);height:var(--space-6);background:var(--accent)"></span>6</div>
<div style="display:flex;flex-direction:column;align-items:center;gap:6px"><span style="width:var(--space-8);height:var(--space-8);background:var(--accent)"></span>8</div>
<div style="display:flex;flex-direction:column;align-items:center;gap:6px"><span style="width:var(--space-10);height:var(--space-10);background:var(--accent)"></span>10</div>
<div style="display:flex;flex-direction:column;align-items:center;gap:6px"><span style="width:var(--space-12);height:var(--space-12);background:var(--accent)"></span>12</div>
<div style="display:flex;flex-direction:column;align-items:center;gap:6px"><span style="width:var(--space-16);height:var(--space-16);background:var(--accent)"></span>16</div>
</div>
</body></html>
