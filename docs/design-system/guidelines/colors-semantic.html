<!-- @dsCard group="Colors" viewport="700x160" name="Semantic & confidence" subtitle="green / amber / red — also drive confidence" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="padding:22px 24px;background:var(--surface);font-family:var(--font-sans)">
<div style="display:flex;gap:14px">
<div style="flex:1;display:flex;flex-direction:column;gap:6px"><div style="height:48px;background:var(--success);border-radius:var(--radius)"></div><div style="height:20px;background:var(--success-subtle-bg);border-radius:var(--radius-sm)"></div><span style="font-size:11px;color:var(--text-muted)">success · confianza alta</span></div>
<div style="flex:1;display:flex;flex-direction:column;gap:6px"><div style="height:48px;background:var(--warning);border-radius:var(--radius)"></div><div style="height:20px;background:var(--warning-subtle-bg);border-radius:var(--radius-sm)"></div><span style="font-size:11px;color:var(--text-muted)">warning · media</span></div>
<div style="flex:1;display:flex;flex-direction:column;gap:6px"><div style="height:48px;background:var(--danger);border-radius:var(--radius)"></div><div style="height:20px;background:var(--danger-subtle-bg);border-radius:var(--radius-sm)"></div><span style="font-size:11px;color:var(--text-muted)">danger · error</span></div>
</div>
</body></html>
