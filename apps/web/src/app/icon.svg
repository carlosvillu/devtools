<!-- Favicon: el cursor de acento del Wordmark (components/ui/wordmark.tsx), aislado.
     Mismo rectángulo redondeado (ratio 1:2, radio 1px) que parpadea junto a «devtools»,
     en el token de acento (blue-600: oklch(0.520 0.198 258), equivalente a #2563eb).
     Fondo transparente para que funcione en pestaña clara u oscura. Convención de
     fichero de Next (app/icon.svg): inyecta el link de icon solo, sin tocar layout.tsx. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect x="11" y="6" width="10" height="20" rx="1.5" fill="#2563eb" />
</svg>
