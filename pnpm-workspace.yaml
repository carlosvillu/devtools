packages:
  - apps/*
  - packages/*

# pnpm 11 exige aprobar explícitamente qué dependencias ejecutan install scripts.
# Las tres los necesitan de verdad (sin ellos no hay binario/binding nativo):
allowBuilds:
  esbuild: true # binario del transpilador que usa tsx (webServer del stack E2E, T1.5)
  lefthook: true # coloca el binario que instala los hooks git (tooling.md §7)
  sharp: true # optimización de imágenes de Next
  unrs-resolver: true # binding nativo del resolver de eslint-plugin-import-x
  # Subdeps opcionales de @testcontainers/postgresql (docker-modem/ssh2): el
  # binding nativo NO hace falta — testcontainers habla con el socket de Docker
  # local, no por SSH. Sin build para no ejecutar scripts que no aportan nada.
  cpu-features: false
  protobufjs: false
  ssh2: false

# UNA versión por dependencia compartida para TODO el monorepo
# (backend/references/tooling.md §6). Dos versiones de zod = dos identidades de
# tipo para el mismo Schema y errores de asignabilidad absurdos entre core y web.
catalog:
  zod: ^4.4.3
  pino: ^10.3.1
  react: 19.2.7
  react-dom: 19.2.7
  typescript: ~5.9.0
  vitest: ^4.1.10
  '@types/node': ^24.10.1
  '@types/react': ^19.2.17
  '@types/react-dom': ^19.2.3
  # Tests de componente de apps/web (jsdom + Testing Library) — testing/references/
  # frontend.md §2. Estrenados por la página /design-system (TD.1); TD.2+ los reutilizan.
  jsdom: ^26.1.0
  '@testing-library/react': ^16.3.0
  '@testing-library/user-event': ^14.6.1
  # drizzle-orm + drizzle-kit: la capa de persistencia de packages/db (T0.3).
  # Una sola versión para el schema (drizzle-orm), la generación de migraciones
  # (drizzle-kit) y el harness de Testcontainers de @app/test-utils.
  drizzle-orm: ^0.45.2
  drizzle-kit: ^0.31.10
  pg: ^8.22.0
  '@types/pg': ^8.11.0
  # @testcontainers/postgresql: Postgres real y desechable para los tests de
  # integración de packages/db (testing/db-integration.md). Nada de mocks/SQLite.
  '@testcontainers/postgresql': ^12.0.4
  # pg-boss: el PRD (§5.2) descarta el módulo de cola — no hay apps/worker
